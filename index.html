<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0B1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aliran" />
  <title>Aliran</title>
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #06111E; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overscroll-behavior: none; }
    input { outline: none; }
    ::-webkit-scrollbar { display: none; }
    #install-banner { display: none; position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e2d4a; border: 1px solid #3B82F6; border-radius: 16px; padding: 14px 20px; color: #F1F5F9; font-size: 13px; z-index: 999; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  </style>
</head>
<body>
<div id="root"></div>
<div id="install-banner">📲 Tap Share → "Add to Home Screen" to install Aliran</div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = Recharts;

// ── Data ──────────────────────────────────────────────────────────────────────
const glucoseData = [
  {t:"6am",g:94,m:0},{t:"7am",g:88,m:0},{t:"8am",g:102,m:80},{t:"9am",g:118,m:60},
  {t:"10am",g:130,m:40},{t:"11am",g:122,m:20},{t:"12pm",g:140,m:0},{t:"1pm",g:128,m:0},
  {t:"2pm",g:136,m:0},{t:"3pm",g:124,m:0},{t:"4pm",g:115,m:0},{t:"5pm",g:108,m:0},
  {t:"6pm",g:119,m:0},{t:"7pm",g:112,m:0},{t:"8pm",g:98,m:0},
];
const weightData = [
  {w:"W1",v:87.5},{w:"W2",v:86.8},{w:"W3",v:86.1},{w:"W4",v:85.3},{w:"W5",v:84.9},{w:"W6",v:84.2}
];
const recentLogs = [
  {id:1,label:"GLP-1 Injection",value:"1.2mg",time:"08:30",status:"on-time",color:"#3B82F6",emoji:"💉"},
  {id:2,label:"Breakfast",value:"420 kcal",time:"09:15",status:"logged",color:"#F59E0B",emoji:"🍽️"},
  {id:3,label:"Glucose Reading",value:"118 mg/dL",time:"09:00",status:"normal",color:"#10B981",emoji:"📊"},
  {id:4,label:"Weight",value:"84.2 kg",time:"07:00",status:"logged",color:"#8B5CF6",emoji:"⚖️"},
];
const insightsList = [
  {id:1,emoji:"📈",title:"Glucose spike detected",body:"Your glucose rose 30% after breakfast. Try adding more protein next time.",color:"#F59E0B"},
  {id:2,emoji:"💉",title:"Injection on schedule",body:"Great job — you've logged your dose on time 6 days in a row!",color:"#10B981"},
  {id:3,emoji:"🥗",title:"Macro tip",body:"Higher fibre intake yesterday correlated with a smoother glucose curve.",color:"#3B82F6"},
];
const sideEffects = [
  {label:"Nausea",intensity:2,date:"Yesterday"},
  {label:"Fatigue",intensity:1,date:"2 days ago"},
  {label:"Constipation",intensity:3,date:"3 days ago"},
];

// ── Shared UI ─────────────────────────────────────────────────────────────────
const s = (obj) => obj; // passthrough for style objects

const Badge = ({status}) => {
  const m = {"on-time":["#10B981","On time"],"logged":["#3B82F6","Logged"],"normal":["#10B981","Normal"],"late":["#F59E0B","Late"],"missed":["#EF4444","Missed"]};
  const [c,l] = m[status]||["#64748B",status];
  return <span style={{background:c+"22",color:c,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20}}>{l}</span>;
};

const Dots = ({value,max=5}) => (
  <div style={{display:"flex",gap:4}}>
    {Array.from({length:max}).map((_,i)=>(
      <div key={i} style={{width:8,height:8,borderRadius:"50%",background:i<value?(value>=4?"#EF4444":value>=3?"#F59E0B":"#3B82F6"):"#334155"}}/>
    ))}
  </div>
);

const Toggle = ({value,onChange}) => (
  <div onClick={onChange} style={{width:42,height:24,borderRadius:12,background:value?"#3B82F6":"#334155",position:"relative",cursor:"pointer",transition:"background 0.2s",flexShrink:0}}>
    <div style={{position:"absolute",top:3,left:value?21:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
  </div>
);

const ChartTip = ({active,payload,label}) => {
  if(!active||!payload?.length) return null;
  return (
    <div style={{background:"#1e2d4a",border:"1px solid #3B82F6",borderRadius:10,padding:"10px 14px",fontSize:12}}>
      <p style={{color:"#94A3B8",marginBottom:4}}>{label}</p>
      {payload.map(p=>(
        <p key={p.name} style={{color:p.color,margin:"2px 0"}}>
          {p.name==="g"?`Glucose: ${p.value} mg/dL`:p.value>0?"Medication active":""}
        </p>
      ))}
    </div>
  );
};

// ── Screens ───────────────────────────────────────────────────────────────────
function HomeScreen({setTab}) {
  const [view,setView]=useState("Day");
  const [alert,setAlert]=useState(true);
  return (
    <div style={{paddingBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 20px 12px"}}>
        <div>
          <p style={{color:"#64748B",fontSize:12,marginBottom:2}}>Good morning 👋</p>
          <h2 style={{color:"#F1F5F9",fontSize:20,fontWeight:700}}>Your Dashboard</h2>
        </div>
        <div style={{position:"relative"}}>
          <div style={{background:"#1e2d4a",borderRadius:12,padding:10,fontSize:18}}>🔔</div>
          <div style={{position:"absolute",top:-4,right:-4,width:10,height:10,background:"#F59E0B",borderRadius:"50%",border:"2px solid #0B1628"}}/>
        </div>
      </div>

      {alert&&(
        <div style={{margin:"0 20px 16px",background:"#F59E0B22",border:"1px solid #F59E0B55",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:16}}>⚠️</span>
          <p style={{color:"#FCD34D",fontSize:12,flex:1}}>Next dose due at 20:30 · 1.2mg</p>
          <span onClick={()=>setAlert(false)} style={{color:"#64748B",cursor:"pointer",fontSize:16,lineHeight:1}}>✕</span>
        </div>
      )}

      <div style={{display:"flex",gap:8,padding:"0 20px",marginBottom:16}}>
        {["Day","Week","Month"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{padding:"6px 18px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:view===v?(v==="Week"?"#F59E0B":"#3B82F6"):"#1e2d4a",color:view===v?"#fff":"#64748B"}}>{v}</button>
        ))}
      </div>

      <div style={{background:"#0d1e35",margin:"0 20px",borderRadius:16,padding:"16px 8px 8px",border:"1px solid #1e2d4a"}}>
        <div style={{display:"flex",gap:20,paddingLeft:16,marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:20,height:3,background:"#3B82F6",borderRadius:2}}/><span style={{color:"#94A3B8",fontSize:11}}>Glucose</span></div>
          <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:20,height:3,background:"#F59E0B",borderRadius:2}}/><span style={{color:"#94A3B8",fontSize:11}}>Medication</span></div>
        </div>
        <ResponsiveContainer width="100%" height={180}>
          <LineChart data={glucoseData} margin={{left:-10,right:10}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#1e2d4a"/>
            <XAxis dataKey="t" tick={{fill:"#475569",fontSize:10}} tickLine={false} axisLine={false} interval={2}/>
            <YAxis tick={{fill:"#475569",fontSize:10}} tickLine={false} axisLine={false} domain={[60,160]}/>
            <Tooltip content={<ChartTip/>}/>
            <ReferenceLine y={140} stroke="#EF444444" strokeDasharray="4 4"/>
            <ReferenceLine y={70} stroke="#F59E0B44" strokeDasharray="4 4"/>
            <Line type="monotone" dataKey="g" stroke="#3B82F6" strokeWidth={2.5} dot={{fill:"#3B82F6",r:3}} activeDot={{r:6}}/>
            <Line type="monotone" dataKey="m" stroke="#F59E0B" strokeWidth={2.5} dot={false} strokeDasharray="6 2"/>
          </LineChart>
        </ResponsiveContainer>
        <div style={{display:"flex",justifyContent:"space-between",padding:"8px 16px 0",borderTop:"1px solid #1e2d4a"}}>
          {[["Current","112 mg/dL","#3B82F6"],["Time in Range","73%","#10B981"],["Next Dose","20:30","#F59E0B"]].map(([l,v,c])=>(
            <div key={l} style={{textAlign:"center"}}>
              <p style={{color:"#64748B",fontSize:10}}>{l}</p>
              <p style={{color:c,fontWeight:700,fontSize:15}}>{v}</p>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"20px 20px 0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <h3 style={{color:"#F1F5F9",fontSize:15,fontWeight:700}}>Recent Logs</h3>
          <button onClick={()=>setTab("log")} style={{background:"none",border:"none",color:"#3B82F6",fontSize:12,cursor:"pointer",fontWeight:600}}>See all</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {recentLogs.map(log=>(
            <div key={log.id} style={{background:"#1e2d4a",borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
              <div style={{background:log.color+"22",borderRadius:10,padding:8,fontSize:18}}>{log.emoji}</div>
              <div style={{flex:1}}>
                <p style={{color:"#F1F5F9",fontSize:13,fontWeight:600}}>{log.label}</p>
                <p style={{color:"#64748B",fontSize:11,marginTop:2}}>{log.value} · {log.time}</p>
              </div>
              <Badge status={log.status}/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function LogScreen() {
  const [active,setActive]=useState(null);
  const [dose,setDose]=useState("1.2");
  const [time,setTime]=useState("08:30");
  const [food,setFood]=useState("");
  const [glucose,setGlucose]=useState("");
  const [weight,setWeight]=useState("");
  const [logged,setLogged]=useState([]);
  const types=[
    {id:"injection",label:"Injection",emoji:"💉",color:"#3B82F6",desc:"Log GLP-1 dose"},
    {id:"glucose",label:"Glucose",emoji:"📊",color:"#10B981",desc:"Manual reading"},
    {id:"food",label:"Food",emoji:"🍽️",color:"#F59E0B",desc:"Meal & macros"},
    {id:"weight",label:"Weight",emoji:"⚖️",color:"#8B5CF6",desc:"Body weight"},
    {id:"symptom",label:"Symptom",emoji:"🤢",color:"#EF4444",desc:"Side effects"},
  ];
  const inp = {width:"100%",background:"#0B1628",border:"1px solid #334155",borderRadius:10,padding:"10px 14px",color:"#F1F5F9",fontSize:14,boxSizing:"border-box"};
  const lbl = {color:"#94A3B8",fontSize:12,display:"block",marginBottom:6};
  return (
    <div style={{padding:"20px 20px 20px"}}>
      <h2 style={{color:"#F1F5F9",fontSize:20,fontWeight:700,marginBottom:4}}>Log Entry</h2>
      <p style={{color:"#64748B",fontSize:13,marginBottom:20}}>Track your health events</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
        {types.map(t=>(
          <button key={t.id} onClick={()=>setActive(active===t.id?null:t.id)} style={{background:active===t.id?t.color+"33":"#1e2d4a",border:active===t.id?`2px solid ${t.color}`:"2px solid transparent",borderRadius:14,padding:"16px 14px",cursor:"pointer",textAlign:"left"}}>
            <span style={{fontSize:22}}>{t.emoji}</span>
            <p style={{color:"#F1F5F9",fontWeight:700,fontSize:14,marginTop:8}}>{t.label}</p>
            <p style={{color:"#64748B",fontSize:11}}>{t.desc}</p>
          </button>
        ))}
      </div>
      {active&&(
        <div style={{background:"#1e2d4a",borderRadius:16,padding:20,marginBottom:16}}>
          <h3 style={{color:"#F1F5F9",fontSize:15,fontWeight:700,marginBottom:16}}>{types.find(t=>t.id===active)?.label} Details</h3>
          {active==="injection"&&<div style={{display:"flex",flexDirection:"column",gap:12}}><div><label style={lbl}>Dose (mg)</label><input value={dose} onChange={e=>setDose(e.target.value)} style={inp}/></div><div><label style={lbl}>Time</label><input type="time" value={time} onChange={e=>setTime(e.target.value)} style={inp}/></div></div>}
          {active==="glucose"&&<div><label style={lbl}>Reading (mg/dL)</label><input value={glucose} onChange={e=>setGlucose(e.target.value)} placeholder="e.g. 112" style={inp}/></div>}
          {active==="food"&&<div><label style={lbl}>Meal description</label><input value={food} onChange={e=>setFood(e.target.value)} placeholder="e.g. Oats with banana" style={inp}/></div>}
          {active==="weight"&&<div><label style={lbl}>Weight (kg)</label><input value={weight} onChange={e=>setWeight(e.target.value)} placeholder="e.g. 84.2" style={inp}/></div>}
          {active==="symptom"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>{["Nausea","Fatigue","Constipation","Headache"].map(s=><div key={s} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"#94A3B8",fontSize:13}}>{s}</span><Dots value={2}/></div>)}</div>}
          <button onClick={()=>{setLogged(p=>[{type:active,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})},...p]);setActive(null);}} style={{marginTop:16,width:"100%",padding:"12px",background:"linear-gradient(135deg,#3B82F6,#2563EB)",border:"none",borderRadius:12,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>Save Entry ✓</button>
        </div>
      )}
      {logged.map((l,i)=>(
        <div key={i} style={{background:"#10B98122",border:"1px solid #10B98144",borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <span style={{fontSize:16}}>✅</span>
          <p style={{color:"#10B981",fontSize:13,fontWeight:600}}>{types.find(t=>t.id===l.type)?.label} logged at {l.time}</p>
        </div>
      ))}
    </div>
  );
}

function TrendsScreen() {
  return (
    <div style={{padding:"20px 20px 20px"}}>
      <h2 style={{color:"#F1F5F9",fontSize:20,fontWeight:700,marginBottom:4}}>Trends</h2>
      <p style={{color:"#64748B",fontSize:13,marginBottom:20}}>Your progress over time</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
        {[["Avg Glucose","118","mg/dL","#3B82F6"],["Weight Lost","3.3","kg","#10B981"],["Doses on Time","91","%","#F59E0B"]].map(([l,v,u,c])=>(
          <div key={l} style={{background:"#1e2d4a",borderRadius:12,padding:"12px 10px",textAlign:"center"}}>
            <p style={{color:c,fontWeight:800,fontSize:20}}>{v}<span style={{fontSize:11,fontWeight:400}}>{u}</span></p>
            <p style={{color:"#64748B",fontSize:10,marginTop:4}}>{l}</p>
          </div>
        ))}
      </div>
      <div style={{background:"#0d1e35",borderRadius:16,padding:"16px 8px 8px",border:"1px solid #1e2d4a",marginBottom:16}}>
        <p style={{color:"#94A3B8",fontSize:13,fontWeight:600,paddingLeft:12,marginBottom:10}}>Weight Progress (6 weeks)</p>
        <ResponsiveContainer width="100%" height={140}>
          <LineChart data={weightData} margin={{left:-10,right:10}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#1e2d4a"/>
            <XAxis dataKey="w" tick={{fill:"#475569",fontSize:11}} tickLine={false} axisLine={false}/>
            <YAxis tick={{fill:"#475569",fontSize:11}} tickLine={false} axisLine={false} domain={[83,89]}/>
            <Tooltip contentStyle={{background:"#1e2d4a",border:"none",borderRadius:10,color:"#F1F5F9"}}/>
            <Line type="monotone" dataKey="v" stroke="#8B5CF6" strokeWidth={2.5} dot={{fill:"#8B5CF6",r:4}}/>
          </LineChart>
        </ResponsiveContainer>
      </div>
      <div style={{background:"#1e2d4a",borderRadius:16,padding:16,marginBottom:16}}>
        <p style={{color:"#94A3B8",fontSize:13,fontWeight:600,marginBottom:14}}>Side Effect History</p>
        {sideEffects.map(se=>(
          <div key={se.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div><p style={{color:"#F1F5F9",fontSize:13}}>{se.label}</p><p style={{color:"#64748B",fontSize:11}}>{se.date}</p></div>
            <Dots value={se.intensity}/>
          </div>
        ))}
      </div>
      <button style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#3B82F6,#2563EB)",border:"none",borderRadius:14,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>📤 Export Report (CSV / PDF)</button>
    </div>
  );
}

function InsightsScreen() {
  const [dismissed,setDismissed]=useState([]);
  return (
    <div style={{padding:"20px 20px 20px"}}>
      <h2 style={{color:"#F1F5F9",fontSize:20,fontWeight:700,marginBottom:4}}>Insights</h2>
      <p style={{color:"#64748B",fontSize:13,marginBottom:20}}>Personalised daily suggestions</p>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {insightsList.filter(i=>!dismissed.includes(i.id)).map(ins=>(
          <div key={ins.id} style={{background:"#1e2d4a",borderRadius:16,padding:18,borderLeft:`4px solid ${ins.color}`}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <span style={{fontSize:24}}>{ins.emoji}</span>
              <div style={{flex:1}}>
                <p style={{color:"#F1F5F9",fontWeight:700,fontSize:14,marginBottom:6}}>{ins.title}</p>
                <p style={{color:"#94A3B8",fontSize:13,lineHeight:1.5}}>{ins.body}</p>
                <button onClick={()=>setDismissed(d=>[...d,ins.id])} style={{marginTop:10,background:ins.color+"22",border:`1px solid ${ins.color}44`,borderRadius:20,padding:"4px 12px",color:ins.color,fontSize:11,fontWeight:600,cursor:"pointer"}}>Got it →</button>
              </div>
            </div>
          </div>
        ))}
        {dismissed.length===insightsList.length&&<div style={{textAlign:"center",padding:32,color:"#64748B"}}>✅ All caught up for today!</div>}
      </div>
      <div style={{background:"#0d1e35",borderRadius:16,padding:18,marginTop:16,border:"1px solid #1e2d4a"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <span style={{fontSize:16}}>⏰</span>
          <p style={{color:"#F59E0B",fontWeight:700,fontSize:14}}>Upcoming nudge</p>
        </div>
        <p style={{color:"#94A3B8",fontSize:13,lineHeight:1.5}}>You typically feel nauseous 2 hours after your evening dose. Consider a light snack at 22:00 to ease symptoms.</p>
      </div>
    </div>
  );
}

function SettingsScreen() {
  const [notifs,setNotifs]=useState({dose:true,log:true,weight:false,insights:true});
  const labels={dose:"💉 Dose reminders",log:"📝 Log prompts",weight:"⚖️ Weight check-in",insights:"💡 Daily insights"};
  return (
    <div style={{padding:"20px 20px 20px"}}>
      <h2 style={{color:"#F1F5F9",fontSize:20,fontWeight:700,marginBottom:20}}>Settings</h2>
      <div style={{background:"#1e2d4a",borderRadius:16,padding:18,marginBottom:16,display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#3B82F6,#F59E0B)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>👤</div>
        <div>
          <p style={{color:"#F1F5F9",fontWeight:700,fontSize:15}}>Aliran User</p>
          <p style={{color:"#64748B",fontSize:12}}>GLP-1 therapy · Week 6</p>
          <p style={{color:"#3B82F6",fontSize:12,marginTop:2}}>Premium Plan ✦</p>
        </div>
      </div>
      <div style={{background:"#1e2d4a",borderRadius:16,padding:18,marginBottom:16}}>
        <p style={{color:"#94A3B8",fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:14}}>NOTIFICATIONS</p>
        {Object.entries(notifs).map(([k,v])=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <p style={{color:"#F1F5F9",fontSize:13}}>{labels[k]}</p>
            <Toggle value={v} onChange={()=>setNotifs(p=>({...p,[k]:!p[k]}))}/>
          </div>
        ))}
      </div>
      <div style={{background:"#1e2d4a",borderRadius:16,padding:18,marginBottom:16}}>
        <p style={{color:"#94A3B8",fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:14}}>TARGETS</p>
        {[["Glucose target","70–140 mg/dL"],["Weight goal","80 kg"],["Weekly dose","1.2 mg"]].map(([l,v])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <p style={{color:"#F1F5F9",fontSize:13}}>{l}</p>
            <p style={{color:"#3B82F6",fontSize:13,fontWeight:600}}>{v}</p>
          </div>
        ))}
      </div>
      <div style={{background:"#1e2d4a",borderRadius:16,padding:16}}>
        <p style={{color:"#94A3B8",fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:14}}>DATA & PRIVACY</p>
        {["Manage data sharing","Export my data","Delete account"].map((item,i)=>(
          <div key={item} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:i<2?12:0,marginBottom:i<2?12:0,borderBottom:i<2?"1px solid #334155":"none"}}>
            <p style={{color:i===2?"#EF4444":"#F1F5F9",fontSize:13}}>{item}</p>
            <span style={{color:"#64748B"}}>›</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App Shell ─────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState("home");

  useEffect(()=>{
    if("serviceWorker" in navigator){
      navigator.serviceWorker.register("/sw.js").catch(()=>{});
    }
    // Show iOS install hint after 3s
    const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    const isStandalone = window.matchMedia("(display-mode: standalone)").matches;
    if(isIOS && !isStandalone){
      setTimeout(()=>{
        const b = document.getElementById("install-banner");
        if(b){ b.style.display="block"; setTimeout(()=>b.style.display="none",6000); }
      },3000);
    }
  },[]);

  const nav=[
    {id:"home",label:"Home",e:"🏠"},
    {id:"trends",label:"Trends",e:"📈"},
    null,
    {id:"insights",label:"Insights",e:"💡"},
    {id:"settings",label:"Settings",e:"⚙️"},
  ];

  return (
    <div style={{display:"flex",justifyContent:"center",alignItems:"flex-start",minHeight:"100vh",background:"#06111E"}}>
      <div style={{width:"100%",maxWidth:430,minHeight:"100vh",background:"#0B1628",display:"flex",flexDirection:"column",position:"relative"}}>
        {/* Safe area top */}
        <div style={{height:"env(safe-area-inset-top, 20px)",background:"#0B1628"}}/>

        {/* Content */}
        <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
          {tab==="home"&&<HomeScreen setTab={setTab}/>}
          {tab==="log"&&<LogScreen/>}
          {tab==="trends"&&<TrendsScreen/>}
          {tab==="insights"&&<InsightsScreen/>}
          {tab==="settings"&&<SettingsScreen/>}
        </div>

        {/* Bottom nav */}
        <div style={{background:"#0d1e35",borderTop:"1px solid #1e2d4a",display:"flex",justifyContent:"space-around",alignItems:"center",padding:"10px 0",paddingBottom:"calc(10px + env(safe-area-inset-bottom, 0px))"}}>
          {nav.map((t,i)=>{
            if(!t) return (
              <div key="fab" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <button onClick={()=>setTab("log")} style={{width:54,height:54,borderRadius:"50%",background:"linear-gradient(135deg,#3B82F6,#2563EB)",border:"none",cursor:"pointer",fontSize:24,boxShadow:"0 4px 20px rgba(59,130,246,0.5)",marginTop:-24,display:"flex",alignItems:"center",justifyContent:"center"}}>＋</button>
                <span style={{color:tab==="log"?"#3B82F6":"#475569",fontSize:10}}>Log</span>
              </div>
            );
            return (
              <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"0 8px"}}>
                <span style={{fontSize:20}}>{t.e}</span>
                <span style={{color:tab===t.id?"#3B82F6":"#475569",fontSize:10,fontWeight:tab===t.id?700:400}}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
